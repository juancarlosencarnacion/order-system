services:
  # --- POSTGRESQL (Base de datos principal) ---
  postgres:
    image: postgres:17-alpine
    container_name: quarkus_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: order_system_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # --- REDIS (Caché de alta velocidad) ---
  redis:
    image: redis:7-alpine
    container_name: quarkus_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  # --- REDIS INSIGHT (Entorno Gráfico para Redis) ---
  redis-insight:
    image: redis/redisinsight:latest
    container_name: quarkus_redis_insight
    ports:
      - "5540:5540" # 👈 Puerto para abrir en el navegador
    depends_on:
      - redis
    networks:
      - app-network

  # --- KAFKA (Mensajería Asíncrona en modo KRaft) ---
  kafka:
    image: apache/kafka:3.7.0
    container_name: quarkus_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      
      # ⚠️ CAMBIO CRUCIAL: Añadimos INTERNAL para que Kafdrop y Quarkus se comuniquen por dentro de Docker
      KAFKA_LISTENERS: 'EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'EXTERNAL://localhost:9092,INTERNAL://kafka:29092'
      
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - app-network

  # --- KAFDROP (Entorno Gráfico para Kafka) ---
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: quarkus_kafdrop
    ports:
      - "9000:9000" # 👈 Puerto para abrir en el navegador
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092" # Se conecta al puerto interno de Kafka
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      - kafka
    networks:
      - app-network
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: quarkus_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=FALSE
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - kafka
      - redis
    networks:
      - app-network

# Creamos una red compartida explícita para que todos los contenedores se vean por nombre
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  n8n_data: